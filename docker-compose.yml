version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: expense-postgres

    environment:
      POSTGRES_DB: expense_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: expense-redis

    ports:
      - "6379:6379"

  app:
    build: .
    container_name: expense-app

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expense_manager_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      JWT_SECRET: mysecretkeymysecretkeymysecretkey12

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379